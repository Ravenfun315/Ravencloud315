<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAVEN CLOUD · воронье облако</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0507;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #ffd7d7;
        }

        .app {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #0d080b 0%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(170, 34, 34, 0.2);
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-2deg); }
            75% { transform: translateY(5px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px #aa2222; }
            50% { text-shadow: 0 0 30px #ff4444, 0 0 10px #ff0000; }
            100% { text-shadow: 0 0 10px #aa2222; }
        }

        @keyframes glow {
            0% { filter: drop-shadow(0 0 5px #aa2222); }
            50% { filter: drop-shadow(0 0 20px #ff4444) drop-shadow(0 0 10px #ff0000); }
            100% { filter: drop-shadow(0 0 5px #aa2222); }
        }

        @keyframes wingFlap {
            0% { transform: rotate(0deg) scaleX(1); }
            50% { transform: rotate(-5deg) scaleX(0.9); }
            100% { transform: rotate(0deg) scaleX(1); }
        }

        @keyframes headTurn {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            96% { transform: scaleY(0.1); }
        }

        /* ===== ШАПКА С ВОРОНОМ ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 1rem 1rem;
            position: relative;
        }

        .raven-container {
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px #aa2222);
        }

        .raven-svg {
            width: 70px;
            height: 70px;
            transition: all 0.3s ease;
        }

        .raven-svg:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 30px #ff4444);
        }

        .raven-head {
            animation: headTurn 8s ease-in-out infinite;
            transform-origin: 45% 35%;
        }

        .raven-wing {
            animation: wingFlap 3s ease-in-out infinite;
            transform-origin: 60% 45%;
        }

        .raven-eye {
            animation: blink 4s infinite;
        }

        .title-container {
            flex: 1;
        }

        .title-container h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }

        .raven-text {
            background: linear-gradient(135deg, #ffd7d7, #ff9f9f, #ff6666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 3s ease-in-out infinite;
        }

        .cloud-text {
            background: linear-gradient(135deg, #aa2222, #660000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.7rem;
            color: #aa6666;
            letter-spacing: 2px;
            margin-top: 0.2rem;
        }

        .header-badge {
            background: #1a0808;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            color: #ff9999;
            border: 1px solid #aa2222;
            box-shadow: 0 0 10px rgba(170, 34, 34, 0.5);
            white-space: nowrap;
        }

        /* ===== СТАТУС ===== */
        .status {
            background: rgba(26, 8, 8, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #aa2222;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            margin: 0.5rem 1rem;
            text-align: center;
            color: #ff9999;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 0 20px rgba(170, 34, 34, 0.3);
        }

        /* ===== КНОПКИ ===== */
        button {
            background: linear-gradient(145deg, #882222, #660000);
            border: none;
            border-radius: 30px;
            padding: 1rem;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
            margin: 0.3rem 0;
            border: 1px solid #ff6666;
            box-shadow: 0 5px 15px rgba(170, 34, 34, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        button:hover::after {
            left: 100%;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(255, 68, 68, 0.6);
        }

        button.secondary {
            background: linear-gradient(145deg, #330000, #1a0000);
            border: 1px solid #aa2222;
            color: #ff9999;
        }

        /* ===== ПОЛЯ ВВОДА ===== */
        input {
            background: rgba(26, 12, 12, 0.9);
            border: 1px solid #aa2222;
            border-radius: 30px;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            color: #ffd7d7;
            outline: none;
            width: 100%;
            margin: 0.5rem 0;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        input:focus {
            border-color: #ff4d4d;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        input::placeholder {
            color: #884444;
        }

        /* ===== КАРТОЧКИ ===== */
        .card {
            background: rgba(16, 8, 8, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #992222;
            border-radius: 30px;
            padding: 1.5rem;
            margin: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin: 0.5rem 1rem;
        }

        .stat-item {
            background: rgba(16, 8, 8, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #992222;
            border-radius: 25px;
            padding: 1.2rem 0.3rem;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .stat-item:hover {
            border-color: #ff4444;
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff6666;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        .stat-label {
            font-size: 0.65rem;
            color: #aa8888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== ЗАГРУЗКА ===== */
        .upload-section {
            margin: 0.5rem 1rem;
        }

        .upload-btn {
            position: relative;
            overflow: hidden;
        }

        .upload-btn::before {
            content: '📤';
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem;
            margin-bottom: 80px;
        }

        /* ===== СПИСОК ФАЙЛОВ ===== */
        .files-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .file-item {
            background: rgba(16, 8, 8, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #992222;
            border-radius: 25px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .file-item:hover {
            border-color: #ff4444;
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(255, 68, 68, 0.3);
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: rgba(26, 10, 10, 0.9);
            border-radius: 15px;
            border: 1px solid #aa2222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 0 15px rgba(170, 34, 34, 0.3);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            margin-bottom: 0.3rem;
            word-break: break-word;
            font-size: 0.95rem;
            color: #ffd7d7;
        }

        .file-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.65rem;
            color: #aa6666;
            flex-wrap: wrap;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .file-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(26, 10, 10, 0.9);
            border: 1px solid #aa2222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(170, 34, 34, 0.3);
        }

        .file-btn:active {
            background: #aa2222;
            transform: scale(0.9);
        }

        .file-btn:hover {
            border-color: #ff4444;
            box-shadow: 0 0 20px #ff4444;
        }

        /* ===== ПУСТОЕ СОСТОЯНИЕ ===== */
        .empty-state {
            padding: 4rem 1rem;
            background: rgba(15, 6, 6, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            text-align: center;
            border: 1px solid #882222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .empty-message {
            font-size: 1.5rem;
            color: #aa6666;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .empty-hint {
            font-size: 0.9rem;
            color: #884444;
        }

        /* ===== НИЖНЕЕ МЕНЮ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: rgba(13, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid #aa2222;
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0 1.2rem;
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            background: transparent;
            border: none;
            color: #aa8888;
            font-size: 0.7rem;
            padding: 0.3rem;
            margin: 0;
            box-shadow: none;
        }

        .nav-item.active {
            color: #ff6666;
            background: transparent;
        }

        .nav-item.active .nav-icon {
            filter: drop-shadow(0 0 10px #ff4444);
            transform: scale(1.1);
        }

        .nav-icon {
            font-size: 1.8rem;
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-info {
            background: rgba(16, 8, 8, 0.9);
            border: 1px solid #992222;
            border-radius: 30px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff6666;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        .profile-detail {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #ffaaaa;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            padding: 0.8rem;
            background: rgba(15, 6, 6, 0.8);
            border-radius: 20px;
            border: 1px solid #882222;
        }

        /* ===== СКРЫТО ===== */
        .hidden { display: none !important; }

        /* ===== ОТЛАДКА ===== */
        .debug {
            font-size: 0.65rem;
            color: #884444;
            padding: 0.5rem;
            background: rgba(10, 0, 0, 0.9);
            border-radius: 10px;
            margin: 0.5rem 1rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ШАПКА С АНИМИРОВАННЫМ ВОРОНОМ -->
        <div class="header">
            <div class="raven-container">
                <svg class="raven-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <linearGradient id="feather" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#1a1a1a"/>
                            <stop offset="100%" stop-color="#0a0a0a"/>
                        </linearGradient>
                    </defs>

                    <!-- Тень -->
                    <ellipse cx="50" cy="92" rx="28" ry="8" fill="#330000" opacity="0.3" filter="url(#glow)"/>

                    <!-- Тело -->
                    <path d="M52 28 L68 40 L74 55 L68 72 L50 82 L32 72 L26 55 L32 40 L48 28" 
                          fill="url(#feather)" stroke="#aa2222" stroke-width="2.5" filter="url(#glow)"/>

                    <!-- Грудка -->
                    <path d="M48 45 L60 48 L58 60 L50 65 L42 60 L40 48 L48 45" 
                          fill="#2a2a2a" stroke="#882222" stroke-width="1.5"/>

                    <!-- Голова (анимированная) -->
                    <g class="raven-head">
                        <ellipse cx="44" cy="30" rx="15" ry="13" fill="#111111" stroke="#aa2222" stroke-width="2.5"/>
                        
                        <!-- Клюв -->
                        <path d="M30 28 L22 26 L28 34 L30 30" fill="#333333" stroke="#aa2222" stroke-width="1.5"/>
                        <path d="M34 26 L28 23 L22 26 L28 29 L34 26" fill="#444444" stroke="#aa2222" stroke-width="1.5"/>
                        
                        <!-- Глаз с бликом -->
                        <circle cx="38" cy="26" r="5.5" fill="#000000" stroke="#aa2222" stroke-width="2"/>
                        <circle cx="36" cy="24" r="2" fill="#ffffff" class="raven-eye"/>
                        <circle cx="37.5" cy="25.5" r="1.2" fill="#ff0000"/>
                    </g>

                    <!-- Крыло (анимированное) -->
                    <g class="raven-wing">
                        <path d="M62 45 L80 33 L86 45 L80 57 L68 60 L62 53 L62 45" 
                              fill="#1a1a1a" stroke="#aa2222" stroke-width="2.5"/>
                        <path d="M70 48 L78 42 L82 48 L78 54 L70 52 L70 48" 
                              fill="#252525" stroke="#882222" stroke-width="1.5"/>
                    </g>

                    <!-- Хвост -->
                    <path d="M44 76 L50 84 L56 85 L62 82 L60 76 L50 73 L40 76 L44 76" 
                          fill="#151515" stroke="#aa2222" stroke-width="2"/>
                    
                    <!-- Лапы -->
                    <g>
                        <path d="M44 82 L42 91 L44 93 L46 91 L44 82" fill="#222222" stroke="#aa2222" stroke-width="1.5"/>
                        <path d="M56 83 L54 92 L56 94 L58 92 L56 83" fill="#222222" stroke="#aa2222" stroke-width="1.5"/>
                        <circle cx="42" cy="93" r="2" fill="#111111" stroke="#aa2222" stroke-width="1"/>
                        <circle cx="46" cy="93" r="2" fill="#111111" stroke="#aa2222" stroke-width="1"/>
                        <circle cx="54" cy="94" r="2" fill="#111111" stroke="#aa2222" stroke-width="1"/>
                        <circle cx="58" cy="94" r="2" fill="#111111" stroke="#aa2222" stroke-width="1"/>
                    </g>

                    <!-- Детали перьев -->
                    <path d="M50 48 L52 50 L50 52 L48 50 L50 48" stroke="#ff6666" stroke-width="1" fill="none" opacity="0.3"/>
                    <path d="M58 42 L60 44 L58 46 L56 44 L58 42" stroke="#ff6666" stroke-width="1" fill="none" opacity="0.3"/>
                </svg>
            </div>
            
            <div class="title-container">
                <h1>
                    <span class="raven-text">RAVEN</span> <span class="cloud-text">CLOUD</span>
                </h1>
                <div class="subtitle">◈ ВОРОНЬЕ ОБЛАКО ◈</div>
            </div>
            
            <div class="header-badge" id="roleBadge">🪶 СТАЯ</div>
        </div>

        <!-- СТАТУС -->
        <div class="status" id="status">⏳ ЗАГРУЗКА...</div>

        <!-- БЛОК ВХОДА -->
        <div id="authBlock">
            <div class="card">
                <h2 style="margin-bottom: 1.5rem; color: #ffaaaa; text-align: center;">🪶 ВХОД В СТАЮ</h2>
                <input type="text" id="firstName" placeholder="Имя" value="Тест">
                <input type="text" id="lastName" placeholder="Фамилия" value="Тестов">
                <input type="tel" id="phone" placeholder="Телефон" value="+79991234567">
                <button id="registerBtn">ВОЙТИ</button>
            </div>
        </div>

        <!-- БЛОК ПОЛЬЗОВАТЕЛЯ -->
        <div id="userBlock" class="hidden">
            <div class="card">
                <div class="profile-name" id="userName"></div>
                <div class="profile-detail">
                    <span>📱</span>
                    <span id="userPhone"></span>
                </div>
                <button class="secondary" id="logoutBtn">🚪 ВЫЙТИ</button>
            </div>
        </div>

        <!-- СТАТИСТИКА -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="myFilesCount">0</div>
                <div class="stat-label">МОИ</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalFilesCount">0</div>
                <div class="stat-label">ВСЕГО</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalSize">0</div>
                <div class="stat-label">ОБЪЁМ</div>
            </div>
        </div>

        <!-- ЗАГРУЗКА -->
        <div class="upload-section">
            <button class="upload-btn" id="uploadBtn">ЗАГРУЗИТЬ ФАЙЛ</button>
            <input type="file" id="fileInput" style="display: none;" multiple>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="content" id="content">
            <div class="files-list" id="filesList"></div>
        </div>

        <!-- НИЖНЕЕ МЕНЮ -->
        <div class="bottom-nav">
            <button class="nav-item active" data-view="home">
                <span class="nav-icon">🏠</span>
                <span>ГЛАВНАЯ</span>
            </button>
            <button class="nav-item" data-view="my">
                <span class="nav-icon">📁</span>
                <span>МОИ</span>
            </button>
            <button class="nav-item" data-view="all">
                <span class="nav-icon">🌍</span>
                <span>ВСЕ</span>
            </button>
            <button class="nav-item" data-view="profile">
                <span class="nav-icon">👤</span>
                <span>ПРОФИЛЬ</span>
            </button>
        </div>

        <!-- ОТЛАДКА (скрыта) -->
        <div class="debug hidden" id="debug"></div>
    </div>

    <script>
        // ========== ТВОИ КЛЮЧИ JSONBIN ==========
        const BIN_ID = '69b7920256e12a1d72419588';
        const MASTER_KEY = '$2a$10$lsKu6XW1idjVu.zHgZTZheVdAqex25RZqhzRCgXYK6SQYL41ziA8a';
        const ACCESS_KEY = '$2a$10$LP7r8pMWAIX9LvGXbBsHOOYWCbEa1.3Ua76vkJFmsVEi.0Aow/sQG';

        // ========== СОСТОЯНИЕ ==========
        let state = {
            currentUser: null,
            allFiles: [],
            users: [],
            currentView: 'home'
        };

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const elements = {
            status: document.getElementById('status'),
            debug: document.getElementById('debug'),
            roleBadge: document.getElementById('roleBadge'),
            
            authBlock: document.getElementById('authBlock'),
            userBlock: document.getElementById('userBlock'),
            
            firstName: document.getElementById('firstName'),
            lastName: document.getElementById('lastName'),
            phone: document.getElementById('phone'),
            registerBtn: document.getElementById('registerBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            
            userName: document.getElementById('userName'),
            userPhone: document.getElementById('userPhone'),
            
            uploadBtn: document.getElementById('uploadBtn'),
            fileInput: document.getElementById('fileInput'),
            
            filesList: document.getElementById('filesList'),
            content: document.getElementById('content'),
            
            myFilesCount: document.getElementById('myFilesCount'),
            totalFilesCount: document.getElementById('totalFilesCount'),
            totalSize: document.getElementById('totalSize'),
            
            navItems: document.querySelectorAll('.nav-item')
        };

        // ========== ЗАГРУЗКА ИЗ ОБЛАКА ==========
        async function loadFromCloud() {
            updateStatus('⏳ ЗАГРУЗКА...');
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': MASTER_KEY,
                        'X-Access-Key': ACCESS_KEY
                    }
                });
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                const data = await response.json();
                const content = data.record || data;
                
                if (content.files) state.allFiles = content.files;
                if (content.users) state.users = content.users;
                
                updateStatus('✨ СИНХРОНИЗИРОВАНО');
                updateDebug(`Файлов: ${state.allFiles.length}`);
                return true;
            } catch (error) {
                updateStatus('⚠️ ЛОКАЛЬНЫЙ РЕЖИМ');
                const local = localStorage.getItem('raven_backup');
                if (local) {
                    const data = JSON.parse(local);
                    if (data.files) state.allFiles = data.files;
                    if (data.users) state.users = data.users;
                }
                return false;
            }
        }

        // ========== СОХРАНЕНИЕ В ОБЛАКО ==========
        async function saveToCloud() {
            try {
                const data = {
                    files: state.allFiles,
                    users: state.users,
                    lastUpdate: new Date().toISOString()
                };
                
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY,
                        'X-Access-Key': ACCESS_KEY
                    },
                    body: JSON.stringify(data)
                });
                
                localStorage.setItem('raven_backup', JSON.stringify(data));
                return true;
            } catch (error) {
                localStorage.setItem('raven_backup', JSON.stringify({
                    files: state.allFiles,
                    users: state.users
                }));
                return false;
            }
        }

        // ========== IP АДРЕС ==========
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return '127.0.0.1';
            }
        }

        // ========== РЕГИСТРАЦИЯ ==========
        async function register() {
            if (!elements.firstName.value || !elements.lastName.value || !elements.phone.value) {
                alert('❌ ЗАПОЛНИ ВСЕ ПОЛЯ');
                return;
            }

            const ip = await getIP();
            
            let user = state.users.find(u => u.ip === ip);
            
            if (!user) {
                user = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                    firstName: elements.firstName.value.trim(),
                    lastName: elements.lastName.value.trim(),
                    phone: elements.phone.value.trim(),
                    ip: ip,
                    registeredAt: new Date().toISOString(),
                    lastSeen: new Date().toISOString()
                };
                state.users.push(user);
            } else {
                user.lastSeen = new Date().toISOString();
            }

            state.currentUser = user;
            
            elements.authBlock.classList.add('hidden');
            elements.userBlock.classList.remove('hidden');
            elements.userName.textContent = `${user.firstName} ${user.lastName}`;
            elements.userPhone.textContent = user.phone;
            elements.roleBadge.textContent = `🪶 ${user.firstName}`;
            
            updateStatus(`✅ ДОБРО ПОЖАЛОВАТЬ, ${user.firstName}!`);
            
            render();
            saveToCloud();
        }

        function logout() {
            state.currentUser = null;
            elements.authBlock.classList.remove('hidden');
            elements.userBlock.classList.add('hidden');
            elements.roleBadge.textContent = '🪶 ГОСТЬ';
            setView('home');
            updateStatus('👋 ДО СВИДАНИЯ');
            render();
        }

        // ========== ЗАГРУЗКА ФАЙЛОВ ==========
        function uploadFiles() {
            if (!state.currentUser) {
                alert('❌ СНАЧАЛА ВОЙДИ');
                return;
            }

            const files = elements.fileInput.files;
            if (!files || files.length === 0) return;

            updateStatus(`⏳ ЗАГРУЗКА ${files.length} ФАЙЛОВ...`);
            
            let loaded = 0;
            let total = files.length;

            Array.from(files).forEach(file => {
                if (file.size > 100 * 1024 * 1024) {
                    alert(`❌ ${file.name} БОЛЬШЕ 100 МБ`);
                    loaded++;
                    if (loaded === total) finish();
                    return;
                }

                const reader = new FileReader();
                
                reader.onload = async function(e) {
                    state.allFiles.push({
                        id: Date.now() + '-' + Math.random().toString(36).substr(2, 12),
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: e.target.result,
                        uploadedBy: state.currentUser.id,
                        uploadedByName: `${state.currentUser.firstName} ${state.currentUser.lastName}`,
                        uploadedAt: new Date().toISOString(),
                        downloads: 0
                    });
                    
                    loaded++;
                    updateStatus(`⏳ ЗАГРУЖЕНО ${loaded}/${total}`);
                    if (loaded === total) finish();
                };

                reader.onerror = function() {
                    loaded++;
                    if (loaded === total) finish();
                };

                reader.readAsDataURL(file);
            });

            const finish = async () => {
                render();
                await saveToCloud();
                updateStatus(`✅ ЗАГРУЖЕНО ${total} ФАЙЛОВ`);
            };

            elements.fileInput.value = '';
        }

        // ========== СКАЧИВАНИЕ ==========
        window.downloadFile = function(fileId) {
            const file = state.allFiles.find(f => f.id === fileId);
            if (!file || !file.data) return;
            
            const a = document.createElement('a');
            a.href = file.data;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            file.downloads = (file.downloads || 0) + 1;
            saveToCloud();
        };

        // ========== УДАЛЕНИЕ ==========
        window.deleteFile = async function(fileId) {
            const file = state.allFiles.find(f => f.id === fileId);
            if (!file) return;
            
            if (state.currentUser && file.uploadedBy === state.currentUser.id) {
                if (confirm('🗑️ УДАЛИТЬ ФАЙЛ?')) {
                    state.allFiles = state.allFiles.filter(f => f.id !== fileId);
                    render();
                    await saveToCloud();
                    updateStatus('🗑️ ФАЙЛ УДАЛЁН');
                }
            }
        };

        // ========== СТАТИСТИКА ==========
        function updateStats() {
            if (!state.currentUser) {
                elements.myFilesCount.textContent = '0';
                elements.totalFilesCount.textContent = state.allFiles.length;
                elements.totalSize.textContent = formatBytes(getTotalBytes());
                return;
            }

            const myFiles = state.allFiles.filter(f => f.uploadedBy === state.currentUser.id);
            elements.myFilesCount.textContent = myFiles.length;
            elements.totalFilesCount.textContent = state.allFiles.length;
            elements.totalSize.textContent = formatBytes(getTotalBytes());
        }

        function getTotalBytes() {
            return state.allFiles.reduce((sum, f) => sum + (f.size || 0), 0);
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' Б';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' МБ';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' ГБ';
        }

        // ========== УПРАВЛЕНИЕ ВКЛАДКАМИ ==========
        function setView(view) {
            state.currentView = view;
            elements.navItems.forEach(item => {
                const itemView = item.dataset.view;
                if (itemView === view) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            render();
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            if (!state.currentUser) {
                if (state.currentView === 'profile') setView('home');
                elements.filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-message">🪶 НЕТ ДОСТУПА</div>
                        <div class="empty-hint">ВОЙДИ В ПРОФИЛЬ</div>
                    </div>
                `;
                updateStats();
                return;
            }

            // Фильтруем файлы
            let files = [];
            if (state.currentView === 'my') {
                files = state.allFiles.filter(f => f.uploadedBy === state.currentUser.id);
            } else if (state.currentView === 'all' || state.currentView === 'home') {
                files = state.allFiles;
            } else if (state.currentView === 'profile') {
                // Профиль
                elements.filesList.innerHTML = `
                    <div class="profile-info">
                        <div class="profile-name">${state.currentUser.firstName} ${state.currentUser.lastName}</div>
                        <div class="profile-detail">
                            <span>📱</span>
                            <span>${state.currentUser.phone}</span>
                        </div>
                        <div class="profile-detail">
                            <span>🆔</span>
                            <span style="font-size:0.8rem;">${state.currentUser.id}</span>
                        </div>
                        <div class="profile-detail">
                            <span>📅</span>
                            <span>${new Date(state.currentUser.registeredAt).toLocaleDateString('ru-RU')}</span>
                        </div>
                        <div class="profile-detail">
                            <span>📁</span>
                            <span>${state.allFiles.filter(f => f.uploadedBy === state.currentUser.id).length} ФАЙЛОВ</span>
                        </div>
                        <button class="secondary" onclick="logout()" style="margin-top:1rem;">🚪 ВЫЙТИ</button>
                    </div>
                `;
                updateStats();
                return;
            }

            if (files.length === 0) {
                elements.filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-message">🪶 ПУСТО</div>
                        <div class="empty-hint">ЗАГРУЗИ ПЕРВЫЙ ФАЙЛ</div>
                    </div>
                `;
                updateStats();
                return;
            }

            // Сортируем по дате
            files.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

            let html = '';
            files.forEach(file => {
                const isMine = file.uploadedBy === state.currentUser.id;
                const icon = getFileIcon(file.name);
                
                html += `
                    <div class="file-item">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-meta">
                                <span>${formatBytes(file.size)}</span>
                                <span>${new Date(file.uploadedAt).toLocaleDateString('ru-RU')}</span>
                                <span>👤 ${file.uploadedByName}</span>
                            </div>
                        </div>
                        <div class="file-actions">
                            <div class="file-btn" onclick="downloadFile('${file.id}')" title="Скачать">⬇️</div>
                            ${isMine ? `<div class="file-btn" onclick="deleteFile('${file.id}')" title="Удалить">🗑️</div>` : ''}
                        </div>
                    </div>
                `;
            });
            
            elements.filesList.innerHTML = html;
            updateStats();
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) return '🖼️';
            if (['mp3','wav','ogg','flac'].includes(ext)) return '🎵';
            if (['mp4','avi','mkv','mov'].includes(ext)) return '🎬';
            if (['zip','rar','7z','tar'].includes(ext)) return '📦';
            if (['pdf','doc','docx','txt'].includes(ext)) return '📄';
            if (['xls','xlsx'].includes(ext)) return '📊';
            if (['ppt','pptx'].includes(ext)) return '📽️';
            return '📁';
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function updateStatus(msg) { 
            elements.status.textContent = msg; 
        }
        
        function updateDebug(msg) { 
            elements.debug.textContent = msg; 
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            updateStatus('⏳ ЗАГРУЗКА...');
            
            await loadFromCloud();
            render();

            // Обработчики
            elements.registerBtn.addEventListener('click', register);
            elements.logoutBtn.addEventListener('click', logout);
            elements.uploadBtn.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', uploadFiles);

            elements.navItems.forEach(item => {
                item.addEventListener('click', () => {
                    setView(item.dataset.view);
                });
            });

            // АВТОСОХРАНЕНИЕ КАЖДЫЕ 5 СЕКУНД
            setInterval(saveToCloud, 5000);

            updateStatus('✨ РАВЕН КЛАУД');
        }

        init();
    </script>
</body>
</html>
