<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAVEN CLOUD · воронье облако</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0507;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #ffd7d7;
        }

        .app {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #0d080b 0%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(170, 34, 34, 0.2);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-2deg); }
            75% { transform: translateY(5px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px #aa2222; }
            50% { text-shadow: 0 0 30px #ff4444, 0 0 10px #ff0000; }
            100% { text-shadow: 0 0 10px #aa2222; }
        }

        @keyframes wingFlap {
            0% { transform: rotate(0deg) scaleX(1); }
            50% { transform: rotate(-5deg) scaleX(0.9); }
            100% { transform: rotate(0deg) scaleX(1); }
        }

        @keyframes headTurn {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            96% { transform: scaleY(0.1); }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 1rem 1rem;
            position: relative;
        }

        .raven-container {
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px #aa2222);
        }

        .raven-svg {
            width: 70px;
            height: 70px;
            transition: all 0.3s ease;
        }

        .raven-head {
            animation: headTurn 8s ease-in-out infinite;
            transform-origin: 45% 35%;
        }

        .raven-wing {
            animation: wingFlap 3s ease-in-out infinite;
            transform-origin: 60% 45%;
        }

        .raven-eye {
            animation: blink 4s infinite;
        }

        .title-container {
            flex: 1;
        }

        .title-container h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }

        .raven-text {
            background: linear-gradient(135deg, #ffd7d7, #ff9f9f, #ff6666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 3s ease-in-out infinite;
        }

        .cloud-text {
            background: linear-gradient(135deg, #aa2222, #660000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.7rem;
            color: #aa6666;
            letter-spacing: 2px;
            margin-top: 0.2rem;
        }

        .header-badge {
            background: #1a0808;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            color: #ff9999;
            border: 1px solid #aa2222;
            white-space: nowrap;
        }

        /* АДМИН-ПАНЕЛЬ */
        .admin-section {
            background: #1a0808;
            border: 2px solid #ff0000;
            border-radius: 30px;
            padding: 1rem;
            margin: 0.5rem 1rem;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .admin-title {
            color: #ff6666;
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .admin-stat {
            background: #0f0606;
            border: 1px solid #882222;
            border-radius: 16px;
            padding: 0.8rem;
            text-align: center;
        }

        .admin-stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ff6666;
        }

        .admin-stat-label {
            font-size: 0.65rem;
            color: #aa8888;
        }

        .logs-container {
            background: #0a0000;
            border: 1px solid #882222;
            border-radius: 20px;
            padding: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.7rem;
            margin-bottom: 0.8rem;
        }

        .log-entry {
            padding: 0.5rem;
            border-bottom: 1px solid #332222;
            color: #aa6666;
        }

        .log-time {
            color: #884444;
            font-size: 0.6rem;
        }

        .log-action {
            color: #ffaaaa;
        }

        .log-user {
            color: #ff6666;
        }

        .status {
            background: rgba(26, 8, 8, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #aa2222;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            margin: 0.5rem 1rem;
            text-align: center;
            color: #ff9999;
            font-size: 0.9rem;
            font-weight: 500;
        }

        button {
            background: linear-gradient(145deg, #882222, #660000);
            border: none;
            border-radius: 30px;
            padding: 1rem;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
            margin: 0.3rem 0;
            border: 1px solid #ff6666;
        }

        button.secondary {
            background: linear-gradient(145deg, #330000, #1a0000);
            border: 1px solid #aa2222;
            color: #ff9999;
        }

        input {
            background: rgba(26, 12, 12, 0.9);
            border: 1px solid #aa2222;
            border-radius: 30px;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            color: #ffd7d7;
            outline: none;
            width: 100%;
            margin: 0.5rem 0;
        }

        .card {
            background: rgba(16, 8, 8, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #992222;
            border-radius: 30px;
            padding: 1.5rem;
            margin: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin: 0.5rem 1rem;
        }

        .stat-item {
            background: rgba(16, 8, 8, 0.9);
            border: 1px solid #992222;
            border-radius: 25px;
            padding: 1.2rem 0.3rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff6666;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #aa8888;
            text-transform: uppercase;
        }

        .upload-section {
            margin: 0.5rem 1rem;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem;
            margin-bottom: 80px;
        }

        .files-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .file-item {
            background: rgba(16, 8, 8, 0.9);
            border: 1px solid #992222;
            border-radius: 25px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: rgba(26, 10, 10, 0.9);
            border-radius: 15px;
            border: 1px solid #aa2222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            margin-bottom: 0.3rem;
            word-break: break-word;
            font-size: 0.95rem;
            color: #ffd7d7;
        }

        .file-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.65rem;
            color: #aa6666;
            flex-wrap: wrap;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .file-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(26, 10, 10, 0.9);
            border: 1px solid #aa2222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: rgba(13, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid #aa2222;
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0 1.2rem;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            background: transparent;
            border: none;
            color: #aa8888;
            font-size: 0.7rem;
            padding: 0.3rem;
        }

        .nav-item.active {
            color: #ff6666;
        }

        .nav-icon {
            font-size: 1.8rem;
        }

        .profile-info {
            background: rgba(16, 8, 8, 0.9);
            border: 1px solid #992222;
            border-radius: 30px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff6666;
            margin-bottom: 0.5rem;
        }

        .profile-detail {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #ffaaaa;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            padding: 0.8rem;
            background: rgba(15, 6, 6, 0.8);
            border-radius: 20px;
        }

        .hidden { display: none !important; }

        .debug {
            font-size: 0.65rem;
            color: #884444;
            padding: 0.5rem;
            background: rgba(10, 0, 0, 0.9);
            border-radius: 10px;
            margin: 0.5rem 1rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ШАПКА -->
        <div class="header">
            <div class="raven-container">
                <svg class="raven-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <linearGradient id="feather" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#1a1a1a"/>
                            <stop offset="100%" stop-color="#0a0a0a"/>
                        </linearGradient>
                    </defs>
                    <ellipse cx="50" cy="92" rx="28" ry="8" fill="#330000" opacity="0.3" filter="url(#glow)"/>
                    <path d="M52 28 L68 40 L74 55 L68 72 L50 82 L32 72 L26 55 L32 40 L48 28" fill="url(#feather)" stroke="#aa2222" stroke-width="2.5"/>
                    <g class="raven-head">
                        <ellipse cx="44" cy="30" rx="15" ry="13" fill="#111111" stroke="#aa2222" stroke-width="2.5"/>
                        <circle cx="38" cy="26" r="5.5" fill="#000000"/>
                        <circle cx="36" cy="24" r="2" fill="#ffffff" class="raven-eye"/>
                    </g>
                    <g class="raven-wing">
                        <path d="M62 45 L80 33 L86 45 L80 57 L68 60 L62 53 L62 45" fill="#1a1a1a" stroke="#aa2222" stroke-width="2.5"/>
                    </g>
                </svg>
            </div>
            
            <div class="title-container">
                <h1>
                    <span class="raven-text">RAVEN</span> <span class="cloud-text">CLOUD</span>
                </h1>
                <div class="subtitle">◈ ВОРОНЬЕ ОБЛАКО ◈</div>
            </div>
            
            <div class="header-badge" id="roleBadge">🪶 ГОСТЬ</div>
        </div>

        <!-- АДМИН-ПАНЕЛЬ -->
        <div class="admin-section" id="adminSection">
            <div class="admin-title">
                <span>👑 АДМИН-ПАНЕЛЬ</span>
            </div>
            
            <div id="adminLogin">
                <input type="password" class="admin-input" id="adminPassword" placeholder="🔒 Пароль администратора">
                <button class="secondary" id="adminLoginBtn">ВОЙТИ КАК АДМИН</button>
            </div>
            
            <div id="adminPanel" class="hidden">
                <div class="admin-stats">
                    <div class="admin-stat">
                        <div class="admin-stat-value" id="adminUsersCount">0</div>
                        <div class="admin-stat-label">ПОЛЬЗОВАТЕЛИ</div>
                    </div>
                    <div class="admin-stat">
                        <div class="admin-stat-value" id="adminFilesCount">0</div>
                        <div class="admin-stat-label">ФАЙЛЫ</div>
                    </div>
                    <div class="admin-stat">
                        <div class="admin-stat-value" id="adminStorage">0</div>
                        <div class="admin-stat-label">ОБЪЁМ</div>
                    </div>
                </div>
                
                <div class="logs-container" id="logsList"></div>
                
                <button class="secondary" id="adminLogoutBtn">🚪 ВЫЙТИ ИЗ АДМИНКИ</button>
            </div>
        </div>

        <!-- СТАТУС -->
        <div class="status" id="status">⏳ ЗАГРУЗКА...</div>

        <!-- БЛОК ВХОДА -->
        <div id="authBlock">
            <div class="card">
                <h2 style="margin-bottom: 1.5rem; color: #ffaaaa; text-align: center;">🪶 ВХОД В СТАЮ</h2>
                <input type="text" id="firstName" placeholder="ИМЯ">
                <input type="text" id="lastName" placeholder="ФАМИЛИЯ">
                <input type="tel" id="phone" placeholder="ТЕЛЕФОН">
                <button id="registerBtn">ВОЙТИ</button>
            </div>
        </div>

        <!-- БЛОК ПОЛЬЗОВАТЕЛЯ -->
        <div id="userBlock" class="hidden">
            <div class="card">
                <div class="profile-name" id="userName"></div>
                <div class="profile-detail">
                    <span>📱</span>
                    <span id="userPhone"></span>
                </div>
                <button class="secondary" id="logoutBtn">🚪 ВЫЙТИ</button>
            </div>
        </div>

        <!-- СТАТИСТИКА -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="myFilesCount">0</div>
                <div class="stat-label">МОИ</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalFilesCount">0</div>
                <div class="stat-label">ВСЕГО</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalSize">0</div>
                <div class="stat-label">ОБЪЁМ</div>
            </div>
        </div>

        <!-- ЗАГРУЗКА -->
        <div class="upload-section">
            <button class="upload-btn" id="uploadBtn">📤 ЗАГРУЗИТЬ ФАЙЛ</button>
            <input type="file" id="fileInput" style="display: none;" multiple>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="content" id="content">
            <div class="files-list" id="filesList"></div>
        </div>

        <!-- НИЖНЕЕ МЕНЮ -->
        <div class="bottom-nav">
            <button class="nav-item active" data-view="home">
                <span class="nav-icon">🏠</span>
                <span>ГЛАВНАЯ</span>
            </button>
            <button class="nav-item" data-view="my">
                <span class="nav-icon">📁</span>
                <span>МОИ</span>
            </button>
            <button class="nav-item" data-view="all">
                <span class="nav-icon">🌍</span>
                <span>ВСЕ</span>
            </button>
            <button class="nav-item" data-view="profile">
                <span class="nav-icon">👤</span>
                <span>ПРОФИЛЬ</span>
            </button>
        </div>

        <div class="debug hidden" id="debug"></div>
    </div>

    <script>
        // ========== КЛЮЧИ JSONBIN ==========
        const BIN_ID = '69b7920256e12a1d72419588';
        const MASTER_KEY = '$2a$10$lsKu6XW1idjVu.zHgZTZheVdAqex25RZqhzRCgXYK6SQYL41ziA8a';
        const ACCESS_KEY = '$2a$10$LP7r8pMWAIX9LvGXbBsHOOYWCbEa1.3Ua76vkJFmsVEi.0Aow/sQG';
        
        // ===== ПАРОЛЬ АДМИНА =====
        const ADMIN_PASSWORD = 'raven315carcrowsss';
        
        // ===== ЛИМИТ 1 ТЕРАБАЙТ =====
        const MAX_FILE_SIZE = 1024 * 1024 * 1024 * 1024; // 1 ТБ в байтах

        // ========== СОСТОЯНИЕ ==========
        let state = {
            currentUser: null,
            allFiles: [],
            users: [],
            logs: [],
            currentView: 'home',
            isAdmin: false
        };

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const elements = {
            status: document.getElementById('status'),
            debug: document.getElementById('debug'),
            roleBadge: document.getElementById('roleBadge'),
            
            authBlock: document.getElementById('authBlock'),
            userBlock: document.getElementById('userBlock'),
            
            firstName: document.getElementById('firstName'),
            lastName: document.getElementById('lastName'),
            phone: document.getElementById('phone'),
            registerBtn: document.getElementById('registerBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            
            userName: document.getElementById('userName'),
            userPhone: document.getElementById('userPhone'),
            
            uploadBtn: document.getElementById('uploadBtn'),
            fileInput: document.getElementById('fileInput'),
            
            filesList: document.getElementById('filesList'),
            content: document.getElementById('content'),
            
            myFilesCount: document.getElementById('myFilesCount'),
            totalFilesCount: document.getElementById('totalFilesCount'),
            totalSize: document.getElementById('totalSize'),
            
            navItems: document.querySelectorAll('.nav-item'),
            
            adminSection: document.getElementById('adminSection'),
            adminLogin: document.getElementById('adminLogin'),
            adminPanel: document.getElementById('adminPanel'),
            adminPassword: document.getElementById('adminPassword'),
            adminLoginBtn: document.getElementById('adminLoginBtn'),
            adminLogoutBtn: document.getElementById('adminLogoutBtn'),
            adminUsersCount: document.getElementById('adminUsersCount'),
            adminFilesCount: document.getElementById('adminFilesCount'),
            adminStorage: document.getElementById('adminStorage'),
            logsList: document.getElementById('logsList')
        };

        // ========== ФУНКЦИЯ ЛОГИРОВАНИЯ ==========
        function addLog(action, user, details = '') {
            const log = {
                time: new Date().toISOString(),
                action: action,
                user: user ? `${user.firstName} ${user.lastName}` : 'Гость',
                phone: user ? user.phone : '-',
                details: details
            };
            
            state.logs.unshift(log);
            if (state.logs.length > 200) state.logs = state.logs.slice(0, 200);
            
            saveToCloud();
            
            if (state.isAdmin) updateAdminPanel();
        }

        // ========== ЗАГРУЗКА ИЗ ОБЛАКА ==========
        async function loadFromCloud() {
            updateStatus('⏳ ЗАГРУЗКА...');
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': MASTER_KEY,
                        'X-Access-Key': ACCESS_KEY
                    }
                });
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                const data = await response.json();
                const content = data.record || data;
                
                if (content.files) state.allFiles = content.files;
                if (content.users) state.users = content.users;
                if (content.logs) state.logs = content.logs;
                
                updateStatus('✨ СИНХРОНИЗИРОВАНО');
                return true;
            } catch (error) {
                updateStatus('⚠️ ЛОКАЛЬНЫЙ РЕЖИМ');
                const local = localStorage.getItem('raven_backup');
                if (local) {
                    const data = JSON.parse(local);
                    if (data.files) state.allFiles = data.files;
                    if (data.users) state.users = data.users;
                    if (data.logs) state.logs = data.logs;
                }
                return false;
            }
        }

        // ========== СОХРАНЕНИЕ В ОБЛАКО ==========
        async function saveToCloud() {
            try {
                const data = {
                    files: state.allFiles,
                    users: state.users,
                    logs: state.logs,
                    lastUpdate: new Date().toISOString()
                };
                
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY,
                        'X-Access-Key': ACCESS_KEY
                    },
                    body: JSON.stringify(data)
                });
                
                localStorage.setItem('raven_backup', JSON.stringify(data));
                return true;
            } catch (error) {
                localStorage.setItem('raven_backup', JSON.stringify({
                    files: state.allFiles,
                    users: state.users,
                    logs: state.logs
                }));
                return false;
            }
        }

        // ========== IP АДРЕС ==========
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return '127.0.0.1';
            }
        }

        // ========== РЕГИСТРАЦИЯ ==========
        async function register() {
            if (!elements.firstName.value || !elements.lastName.value || !elements.phone.value) {
                alert('❌ ЗАПОЛНИ ВСЕ ПОЛЯ');
                return;
            }

            const ip = await getIP();
            
            let user = state.users.find(u => u.ip === ip);
            
            if (!user) {
                user = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                    firstName: elements.firstName.value.trim(),
                    lastName: elements.lastName.value.trim(),
                    phone: elements.phone.value.trim(),
                    ip: ip,
                    registeredAt: new Date().toISOString(),
                    lastSeen: new Date().toISOString()
                };
                state.users.push(user);
                
                addLog('🆕 НОВЫЙ ПОЛЬЗОВАТЕЛЬ', user, `IP: ${ip}`);
            } else {
                user.lastSeen = new Date().toISOString();
                addLog('↩️ ПОВТОРНЫЙ ВХОД', user, `IP: ${ip}`);
            }

            state.currentUser = user;
            
            elements.authBlock.classList.add('hidden');
            elements.userBlock.classList.remove('hidden');
            elements.userName.textContent = `${user.firstName} ${user.lastName}`;
            elements.userPhone.textContent = user.phone;
            elements.roleBadge.textContent = `🪶 ${user.firstName}`;
            
            updateStatus(`✅ ДОБРО ПОЖАЛОВАТЬ, ${user.firstName}!`);
            
            render();
            saveToCloud();
        }

        function logout() {
            if (state.currentUser) {
                addLog('👋 ВЫХОД', state.currentUser);
            }
            
            state.currentUser = null;
            elements.authBlock.classList.remove('hidden');
            elements.userBlock.classList.add('hidden');
            elements.roleBadge.textContent = '🪶 ГОСТЬ';
            setView('home');
            updateStatus('👋 ДО СВИДАНИЯ');
            render();
        }

        // ========== АДМИН-ФУНКЦИИ ==========
        function adminLogin() {
            if (elements.adminPassword.value === ADMIN_PASSWORD) {
                state.isAdmin = true;
                elements.adminLogin.classList.add('hidden');
                elements.adminPanel.classList.remove('hidden');
                
                addLog('👑 ВХОД АДМИНА');
                
                updateAdminPanel();
                render();
            } else {
                alert('❌ НЕВЕРНЫЙ ПАРОЛЬ');
            }
        }

        function adminLogout() {
            state.isAdmin = false;
            elements.adminLogin.classList.remove('hidden');
            elements.adminPanel.classList.add('hidden');
            
            addLog('👑 ВЫХОД АДМИНА');
            
            render();
        }

        function updateAdminPanel() {
            elements.adminUsersCount.textContent = state.users.length;
            elements.adminFilesCount.textContent = state.allFiles.length;
            elements.adminStorage.textContent = formatBytes(getTotalBytes());
            
            let logsHtml = '';
            if (state.logs.length === 0) {
                logsHtml = '<div class="log-entry">📭 ЛОГОВ ПОКА НЕТ</div>';
            } else {
                state.logs.slice(0, 30).forEach(log => {
                    const time = new Date(log.time).toLocaleString('ru-RU', {
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    logsHtml += `
                        <div class="log-entry">
                            <span class="log-time">[${time}]</span>
                            <span class="log-action">${log.action}</span>
                            <span class="log-user">${log.user}</span>
                            ${log.phone !== '-' ? `<span style="color:#884444">📱${log.phone}</span>` : ''}
                            ${log.details ? `<div style="color:#664444; font-size:0.6rem;">${log.details}</div>` : ''}
                        </div>
                    `;
                });
            }
            elements.logsList.innerHTML = logsHtml;
        }

        // ========== ЗАГРУЗКА ФАЙЛОВ ==========
        function uploadFiles() {
            if (!state.currentUser && !state.isAdmin) {
                alert('❌ СНАЧАЛА ВОЙДИ');
                return;
            }

            const files = elements.fileInput.files;
            if (!files || files.length === 0) return;

            updateStatus(`⏳ ЗАГРУЗКА ${files.length} ФАЙЛОВ...`);
            
            let loaded = 0;
            let total = files.length;

            Array.from(files).forEach(file => {
                if (file.size > MAX_FILE_SIZE) {
                    alert(`❌ ${file.name} БОЛЬШЕ 1 ТБ`);
                    loaded++;
                    if (loaded === total) finish();
                    return;
                }

                const reader = new FileReader();
                
                reader.onload = async function(e) {
                    const fileData = {
                        id: Date.now() + '-' + Math.random().toString(36).substr(2, 12),
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: e.target.result,
                        uploadedBy: state.currentUser ? state.currentUser.id : 'admin',
                        uploadedByName: state.currentUser ? `${state.currentUser.firstName} ${state.currentUser.lastName}` : '👑 АДМИН',
                        uploadedAt: new Date().toISOString(),
                        downloads: 0
                    };
                    
                    state.allFiles.push(fileData);
                    
                    if (state.currentUser) {
                        addLog('📤 ЗАГРУЗКА', state.currentUser, `${file.name} (${formatBytes(file.size)})`);
                    } else {
                        addLog('📤 ЗАГРУЗКА (АДМИН)', null, `${file.name}`);
                    }
                    
                    loaded++;
                    updateStatus(`⏳ ЗАГРУЖЕНО ${loaded}/${total}`);
                    if (loaded === total) finish();
                };

                reader.onerror = function() {
                    loaded++;
                    if (loaded === total) finish();
                };

                reader.readAsDataURL(file);
            });

            const finish = async () => {
                render();
                await saveToCloud();
                updateStatus(`✅ ЗАГРУЖЕНО ${total} ФАЙЛОВ`);
            };

            elements.fileInput.value = '';
        }

        // ========== СКАЧИВАНИЕ ==========
        window.downloadFile = function(fileId) {
            const file = state.allFiles.find(f => f.id === fileId);
            if (!file || !file.data) return;
            
            const a = document.createElement('a');
            a.href = file.data;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            file.downloads = (file.downloads || 0) + 1;
            
            if (state.currentUser) {
                addLog('⬇️ СКАЧИВАНИЕ', state.currentUser, file.name);
            }
            
            saveToCloud();
        };

        // ========== УДАЛЕНИЕ ==========
        window.deleteFile = async function(fileId) {
            const file = state.allFiles.find(f => f.id === fileId);
            if (!file) return;
            
            const canDelete = state.isAdmin || (state.currentUser && file.uploadedBy === state.currentUser.id);
            
            if (canDelete) {
                if (confirm('🗑️ УДАЛИТЬ ФАЙЛ?')) {
                    state.allFiles = state.allFiles.filter(f => f.id !== fileId);
                    
                    if (state.currentUser) {
                        addLog('🗑️ УДАЛЕНИЕ', state.currentUser, file.name);
                    } else {
                        addLog('🗑️ УДАЛЕНИЕ (АДМИН)', null, file.name);
                    }
                    
                    render();
                    await saveToCloud();
                    updateStatus('🗑️ ФАЙЛ УДАЛЁН');
                }
            }
        };

        // ========== СТАТИСТИКА ==========
        function updateStats() {
            if (!state.currentUser && !state.isAdmin) {
                elements.myFilesCount.textContent = '0';
                elements.totalFilesCount.textContent = state.allFiles.length;
                elements.totalSize.textContent = formatBytes(getTotalBytes());
                return;
            }

            const myFiles = state.currentUser ? state.allFiles.filter(f => f.uploadedBy === state.currentUser.id) : [];
            elements.myFilesCount.textContent = myFiles.length;
            elements.totalFilesCount.textContent = state.allFiles.length;
            elements.totalSize.textContent = formatBytes(getTotalBytes());
        }

        function getTotalBytes() {
            return state.allFiles.reduce((sum, f) => sum + (f.size || 0), 0);
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' Б';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' МБ';
            if (bytes < 1024 * 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' ГБ';
            return (bytes / (1024 * 1024 * 1024 * 1024)).toFixed(2) + ' ТБ';
        }

        // ========== УПРАВЛЕНИЕ ВКЛАДКАМИ ==========
        function setView(view) {
            state.currentView = view;
            elements.navItems.forEach(item => {
                const itemView = item.dataset.view;
                if (itemView === view) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            render();
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            if (!state.currentUser && !state.isAdmin) {
                if (state.currentView === 'profile') setView('home');
                elements.filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-message">🪶 НЕТ ДОСТУПА</div>
                        <div class="empty-hint">ВОЙДИ В ПРОФИЛЬ</div>
                    </div>
                `;
                updateStats();
                return;
            }

            let files = [];
            if (state.currentView === 'my') {
                files = state.allFiles.filter(f => f.uploadedBy === state.currentUser?.id);
            } else if (state.currentView === 'all' || state.currentView === 'home') {
                files = state.allFiles;
            } else if (state.currentView === 'profile') {
                if (!state.currentUser) {
                    setView('home');
                    return;
                }
                elements.filesList.innerHTML = `
                    <div class="profile-info">
                        <div class="profile-name">${state.currentUser.firstName} ${state.currentUser.lastName}</div>
                        <div class="profile-detail">
                            <span>📱</span>
                            <span>${state.currentUser.phone}</span>
                        </div>
                        <div class="profile-detail">
                            <span>📁</span>
                            <span>${state.allFiles.filter(f => f.uploadedBy === state.currentUser.id).length} ФАЙЛОВ</span>
                        </div>
                        <div class="profile-detail">
                            <span>💾</span>
                            <span>${formatBytes(getTotalBytes())}</span>
                        </div>
                        <button class="secondary" onclick="logout()" style="margin-top:1rem;">🚪 ВЫЙТИ</button>
                    </div>
                `;
                updateStats();
                return;
            }

            if (files.length === 0) {
                elements.filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-message">🪶 ПУСТО</div>
                        <div class="empty-hint">ЗАГРУЗИ ПЕРВЫЙ ФАЙЛ</div>
                    </div>
                `;
                updateStats();
                return;
            }

            files.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

            let html = '';
            files.forEach(file => {
                const isMine = state.currentUser && file.uploadedBy === state.currentUser.id;
                const canDelete = state.isAdmin || isMine;
                const icon = getFileIcon(file.name);
                
                html += `
                    <div class="file-item">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-meta">
                                <span>${formatBytes(file.size)}</span>
                                <span>${new Date(file.uploadedAt).toLocaleDateString('ru-RU')}</span>
                                <span>👤 ${file.uploadedByName}</span>
                            </div>
                        </div>
                        <div class="file-actions">
                            <div class="file-btn" onclick="downloadFile('${file.id}')" title="Скачать">⬇️</div>
                            ${canDelete ? `<div class="file-btn" onclick="deleteFile('${file.id}')" title="Удалить">🗑️</div>` : ''}
                        </div>
                    </div>
                `;
            });
            
            elements.filesList.innerHTML = html;
            updateStats();
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) return '🖼️';
            if (['mp3','wav','ogg','flac'].includes(ext)) return '🎵';
            if (['mp4','avi','mkv','mov'].includes(ext)) return '🎬';
            if (['zip','rar','7z','tar'].includes(ext)) return '📦';
            if (['pdf','doc','docx','txt'].includes(ext)) return '📄';
            return '📁';
        }

        function updateStatus(msg) { 
            elements.status.textContent = msg; 
        }
        
        function updateDebug(msg) { 
            elements.debug.textContent = msg; 
        }

        async function init() {
            updateStatus('⏳ ЗАГРУЗКА...');
            
            await loadFromCloud();
            render();

            elements.registerBtn.addEventListener('click', register);
            elements.logoutBtn.addEventListener('click', logout);
            elements.uploadBtn.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', uploadFiles);

            elements.navItems.forEach(item => {
                item.addEventListener('click', () => {
                    setView(item.dataset.view);
                });
            });

            elements.adminLoginBtn.addEventListener('click', adminLogin);
            elements.adminLogoutBtn.addEventListener('click', adminLogout);
            elements.adminPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') adminLogin();
            });

            setInterval(saveToCloud, 5000);

            updateStatus('✨ РАВЕН КЛАУД');
        }

        init();
    </script>
</body>
</html>
